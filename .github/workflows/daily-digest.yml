name: 毎朝のAIニュース更新

on:
  schedule:
    # cron はUTC時刻で指定する。UTC 22:00 = 日本時間 翌朝7:00 にページを最新へ更新。
    - cron: "0 22 * * *"
  # GitHubの画面から手動でも実行できるようにする（動作確認に便利）
  workflow_dispatch: {}

# GitHub Pages へデプロイするために必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数実行されないようにする
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 依存パッケージをインストール
        run: npm install

      - name: ダイジェストページを生成
        run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: GitHub Pages を設定
        uses: actions/configure-pages@v5

      - name: 生成したページをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
